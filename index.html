<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Roteiros — Andaza Imóveis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0D0D0D;
    --dark-2: #161616;
    --dark-3: #1E1E1E;
    --text: #F0EDE6;
    --text-muted: #666;
    --border: rgba(201,168,76,0.2);
  }
  body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 40px 20px 80px; }
  .container { max-width: 600px; margin: 0 auto; }
  .tag { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px,10vw,80px); line-height: .95; }
  h1 span { color: var(--gold); }
  .sub { color: var(--text-muted); font-size: 14px; font-weight: 300; margin-top: 12px; }
  .divider { height: 1px; background: linear-gradient(90deg, var(--gold), transparent); opacity: .3; margin: 28px 0; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  input, select, textarea {
    width: 100%; background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 300; padding: 13px 15px; outline: none;
    transition: border-color .2s; -webkit-appearance: none;
  }
  input::placeholder, textarea::placeholder { color: #444; font-style: italic; }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  select option { background: var(--dark-3); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn {
    width: 100%; background: var(--gold); border: none; border-radius: 4px;
    color: var(--dark); cursor: pointer; font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: .1em; padding: 17px; margin-top: 8px;
    transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn:hover { background: var(--gold-light); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
  .error { background: rgba(220,60,60,.1); border: 1px solid rgba(220,60,60,.3); border-radius: 4px; color: #ff8080; font-size: 13px; padding: 13px 15px; margin-top: 14px; display: none; }
  .output { margin-top: 32px; display: none; }
  .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .output-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--gold); }
  .copy-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 5px 13px; transition: all .2s; }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
  .output-box { background: var(--dark-2); border: 1px solid var(--border); border-radius: 4px; padding: 24px; font-size: 14px; line-height: 1.85; font-weight: 300; white-space: pre-wrap; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:480px) { .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="tag">Andaza Imóveis · Maceió/AL</div>
  <h1>GERADOR DE<br><span>ROTEIROS</span></h1>
  <p class="sub">Preencha os campos e receba um roteiro no seu estilo.</p>
  <div class="divider"></div>

  <div class="field">
    <label>Tema do vídeo</label>
    <input id="tema" placeholder="Ex: contrato de aluguel 12 ou 30 meses?" />
  </div>

  <div class="row">
    <div class="field">
      <label>Formato</label>
      <select id="formato">
        <option value="">Selecione...</option>
        <option value="juridico">Jurídico / Contratos</option>
        <option value="compra_venda">Compra e Venda</option>
        <option value="tour">Tour Imobiliário</option>
        <option value="lancamento">Lançamento / Obra</option>
        <option value="lifestyle">Lifestyle / Alagoas</option>
        <option value="investimento">Investimento / Ágio</option>
      </select>
    </div>
    <div class="field">
      <label>Rede Social</label>
      <select id="rede">
        <option value="">Selecione...</option>
        <option value="instagram_trafego">Instagram — Tráfego</option>
        <option value="instagram_organico">Instagram — Orgânico</option>
        <option value="tiktok">TikTok</option>
        <option value="youtube">YouTube</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>Público-alvo</label>
    <input id="publico" placeholder="Ex: proprietários que querem colocar imóvel pra alugar" />
  </div>

  <div class="field">
    <label>CTA — O que você quer que a pessoa faça?</label>
    <input id="cta" placeholder="Ex: entrar em contato pra saber mais sobre administração" />
  </div>

  <div class="field">
    <label>Contexto extra <span style="text-transform:none;letter-spacing:0;font-size:11px;color:#444">(opcional)</span></label>
    <textarea id="extra" placeholder="Ex: mostrar autoridade no tema locação, riscos ao proprietário mal assessorado..."></textarea>
  </div>

  <button class="btn" id="btn" onclick="gerar()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">GERAR ROTEIRO</span>
  </button>

  <div class="error" id="error"></div>

  <div class="output" id="output">
    <div class="output-header">
      <div class="output-label">Roteiro gerado</div>
      <button class="copy-btn" onclick="copiar()">Copiar</button>
    </div>
    <div class="output-box" id="output-box"></div>
  </div>
</div>

<script>
const SYSTEM = `Você é o roteirista contratado de Marcelo Pergentino, corretor de imóveis e advogado, sócio da Andaza Imóveis em Maceió/AL. Seu objetivo é torná-lo uma autoridade no mercado imobiliário com conteúdo descontraído, divertido e altamente informativo. Marcelo acredita no poder da educação.

ESTRUTURA OBRIGATÓRIA:
1. GANCHO (primeiros 2 segundos): impactante, foge do óbvio
2. PROBLEMA / SITUAÇÃO: cria identificação
3. DESENVOLVIMENTO: conteúdo real e relevante
4. CTA: chamada para ação clara e natural

TOM:
- Jurídico: técnico-formal mas com personalidade
- Demais: descontraído, autoral, com energia

DURAÇÃO:
- Instagram tráfego: até 1 minuto
- Instagram orgânico / TikTok: até 1'30"
- YouTube: até 10 minutos

ENTREGA: tópicos numerados com sugestão de cena entre colchetes. Linguagem como Marcelo falaria.`;

const fmts = { juridico:"Jurídico / Contratos", compra_venda:"Compra e Venda", tour:"Tour Imobiliário", lancamento:"Lançamento / Obra", lifestyle:"Lifestyle / Alagoas", investimento:"Investimento / Ágio" };
const redes = { instagram_trafego:"Instagram tráfego pago (até 1')", instagram_organico:"Instagram orgânico (até 1'30\")", tiktok:"TikTok (até 1'30\")", youtube:"YouTube (até 10 min)" };

async function gerar() {
  const tema = document.getElementById('tema').value.trim();
  const formato = document.getElementById('formato').value;
  const rede = document.getElementById('rede').value;
  const publico = document.getElementById('publico').value.trim();
  const cta = document.getElementById('cta').value.trim();
  const extra = document.getElementById('extra').value.trim();
  const err = document.getElementById('error');

  err.style.display = 'none';
  if (!tema || !formato || !rede || !publico || !cta) {
    err.textContent = 'Preencha todos os campos obrigatórios.';
    err.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'GERANDO...';
  document.getElementById('output').style.display = 'none';

  const prompt = `TEMA: ${tema}\nFORMATO: ${fmts[formato]}\nREDE: ${redes[rede]}\nPÚBLICO: ${publico}\nCTA: ${cta}${extra ? '\nEXTRA: ' + extra : ''}`;

  try {
    const res = await fetch('/api/gerar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM, prompt })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Erro na API');
    const texto = data.content?.[0]?.text || '';
    document.getElementById('output-box').textContent = texto;
    document.getElementById('output').style.display = 'block';
  } catch(e) {
    err.textContent = 'Erro: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'GERAR ROTEIRO';
  }
}

function copiar() {
  const texto = document.getElementById('output-box').textContent;
  navigator.clipboard.writeText(texto);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copiado ✓';
  setTimeout(() => btn.textContent = 'Copiar', 2000);
}
</script>
</body>
</html>
